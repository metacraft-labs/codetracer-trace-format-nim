name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mm: [orc, arc]
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.x"

      - name: Install system dependencies
        run: sudo apt-get install -y libzstd-dev

      - name: Install Nim dependencies
        run: nimble install -y stew results

      - name: Run all tests (--mm:${{ matrix.mm }})
        run: |
          nim c -r --mm:${{ matrix.mm }} -p:src tests/test_base40.nim
          nim c -r --mm:${{ matrix.mm }} -p:src tests/test_container.nim
          nim c -r --mm:${{ matrix.mm }} -p:src tests/test_streaming.nim
          nim c -r --mm:${{ matrix.mm }} -p:src tests/test_chunk_index.nim
          nim c -r --mm:${{ matrix.mm }} -p:src tests/test_seekable_zstd.nim
          nim c -r --mm:${{ matrix.mm }} -p:src tests/test_trace_types.nim
          nim c -r --mm:${{ matrix.mm }} -p:src tests/test_varint.nim
          nim c -r --mm:${{ matrix.mm }} -p:src tests/test_split_binary.nim
          nim c -r --mm:${{ matrix.mm }} -p:src tests/test_trace_writer.nim

      - name: Verify library compiles as static lib (GC-free)
        run: nim c --mm:arc --app:staticlib --noMain -p:src src/codetracer_ctfs.nim
